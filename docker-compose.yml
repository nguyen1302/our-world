services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ourworld
      POSTGRES_PASSWORD: ourworld
      POSTGRES_DB: ourworld
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ourworld"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    command: ["sh", "scripts/start-web.sh"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  worker:
    build: .
    restart: unless-stopped
    command: ["sh", "scripts/start-worker.sh"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    depends_on:
      - web
