name: Deploy to EC2

# Tự động deploy khi push lên main (hoặc bấm Run workflow thủ công).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -e
            cd ${{ secrets.APP_DIR || '/opt/apps/our-world' }}
            git fetch --all --prune
            git reset --hard origin/main
            docker compose up -d --build web worker
            docker image prune -f || true
            docker compose ps
