# Local verification only: adds a MinIO (S3-compatible) service so the upload
# pipeline can be tested without real AWS. NOT for production.
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./miniodata:/data

  web:
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
